version: '3.8'
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: supportiq-pgvector
    environment:
      POSTGRES_DB: aidb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - supportiq_pgvector_data:/var/lib/postgresql/data

volumes:
  supportiq_pgvector_data:
