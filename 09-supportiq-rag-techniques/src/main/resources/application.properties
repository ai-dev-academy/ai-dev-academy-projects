server.port=8080

# OpenAI — set OPENAI_API_KEY in your environment or .env file
spring.ai.openai.api-key=${OPENAI_API_KEY:your_key_here}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.embedding.model=text-embedding-3-small

# PostgreSQL + pgvector (start with: docker-compose up -d)
spring.datasource.url=jdbc:postgresql://localhost:5432/aidb
spring.datasource.username=postgres
spring.datasource.password=password
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536

logging.level.com.aidevacademy=DEBUG
