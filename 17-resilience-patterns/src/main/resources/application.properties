server.port=8080
spring.ai.openai.api-key=${OPENAI_API_KEY:your_key_here}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500
logging.level.com.aidevacademy=DEBUG

# Resilience4j retry config
resilience4j.retry.instances.ai.max-attempts=3
resilience4j.retry.instances.ai.wait-duration=2s
resilience4j.retry.instances.ai.enable-exponential-backoff=true

# Circuit breaker config
resilience4j.circuitbreaker.instances.ai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ai.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.ai.sliding-window-size=5

# Expose actuator for circuit breaker status
management.endpoints.web.exposure.include=health,metrics,circuitbreakers
